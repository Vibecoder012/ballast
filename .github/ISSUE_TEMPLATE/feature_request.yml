name: Feature request
description: Suggest an improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Note ballast's scope: it is **single-process, single-machine** by design. Proposals
        requiring a broker, a second process, multi-writer semantics, or down-migrations are
        out of scope (see ROADMAP.md). Everything else is fair game.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behaviour
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
